name: PR Checks

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        run: npm ci
        working-directory: functions

  typescript:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm ci
        working-directory: functions

      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    needs: [build, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm ci
        working-directory: functions
      - run: npx expo lint

  expoDoctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true
