name: PR Checks

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install dependencies (functions)
        run: npm ci
        working-directory: functions
  typescript:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: TypeScript check
        run: npx tsc --noEmit
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: ESLint
        run: npx expo lint
  expoDoctor:
    name: expo doctor
    runs-on: ubuntu-latest
    steps:
      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true
